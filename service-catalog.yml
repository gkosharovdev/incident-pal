services:
  - id: order-service
    repositoryUrl: https://github.com/example-org/order-service
    displayName: Order Service
    environments:
      - production
      - staging
    logGroups:
      production: /ecs/order-service/production
      staging: /ecs/order-service/staging
    ecsCluster: main-cluster
    linkingKeySchema:
      orderId: entity-id
      traceId: http-correlation
      messageId: kafka-message-id
    observationTypes:
      - incorrect-status
      - payment-failure
    auroraDatabase:
      production:
        host: order-service.cluster-prod-abc123.eu-west-1.rds.amazonaws.com
        port: 5432
        database: order_service_prod
        username: iam_investigation_user
        region: eu-west-1
        credentialSource: iam
      staging:
        host: order-service-staging.cluster-stg-def456.eu-west-1.rds.amazonaws.com
        port: 5432
        database: order_service_staging
        username: iam_investigation_user
        region: eu-west-1
        credentialSource: iam

  - id: notification-service
    repositoryUrl: https://github.com/example-org/notification-service
    displayName: Notification Service
    environments:
      - production
      - staging
    logGroups:
      production: /ecs/notification-service/production
      staging: /ecs/notification-service/staging
    ecsCluster: main-cluster
    linkingKeySchema:
      customerId: entity-id
      traceId: http-correlation
      notificationId: kafka-message-id
    observationTypes:
      - notification-failure

  - id: payment-service
    repositoryUrl: https://github.com/example-org/payment-service
    displayName: Payment Service
    environments:
      - production
      - staging
    logGroups:
      production: /ecs/payment-service/production
      staging: /ecs/payment-service/staging
    ecsCluster: main-cluster
    linkingKeySchema:
      paymentId: entity-id
      orderId: entity-id
      traceId: http-correlation
    observationTypes:
      - payment-failure
    auroraDatabase:
      production:
        host: payment-service.cluster-prod-ghi789.eu-west-1.rds.amazonaws.com
        port: 5432
        database: payment_service_prod
        username: iam_investigation_user
        region: eu-west-1
        credentialSource: iam
      staging:
        host: payment-service-staging.cluster-stg-jkl012.eu-west-1.rds.amazonaws.com
        port: 5432
        database: payment_service_staging
        username: iam_investigation_user
        region: eu-west-1
        credentialSource: iam

  - id: customer-service
    repositoryUrl: https://github.com/example-org/customer-service
    displayName: Customer Service
    environments:
      - production
      - staging
    logGroups:
      production: /ecs/customer-service/production
      staging: /ecs/customer-service/staging
    ecsCluster: main-cluster
    linkingKeySchema:
      customerId: entity-id
      traceId: http-correlation
    observationTypes:
      - data-discrepancy

  - id: dispatch-service
    repositoryUrl: https://github.com/example-org/dispatch-service
    displayName: Dispatch Service
    environments:
      - production
      - staging
    logGroups:
      production: /ecs/dispatch-service/production
      staging: /ecs/dispatch-service/staging
    ecsCluster: main-cluster
    linkingKeySchema:
      orderId: entity-id
      messageId: kafka-message-id
      traceId: http-correlation
    observationTypes:
      - incorrect-status
      - notification-failure
