services:
  - id: booking-service
    repositoryUrl: https://github.com/gkosharovdev/booking-service
    displayName: Booking Service
    environments:
      - prod
      - dev
    logGroupFilters:
      prod:
        - type: prefix
          value: /ecs/booking-service/prod
        - type: pattern
          value: booking-service
      dev:
        - type: prefix
          value: /ecs/booking-service/dev
        - type: pattern
          value: booking-service
    ecsCluster: booking-service-dev
    linkingKeySchema:
      bookingId: entity-id
      orderId: entity-id
      traceId: http-correlation
    observationTypes:
      - incorrect-status
      - booking-failure
      - data-quality-issue
      - infrastructural-issue
