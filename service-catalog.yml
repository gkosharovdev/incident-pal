services:
  - id: booking-service
    repositoryUrl: https://github.com/gkosharovdev/booking-service
    displayName: Booking Service
    environments:
      - prod
      - dev
    logGroups:
      prod: /ecs/booking-service/prod
      dev: /ecs/booking-service/dev
    ecsCluster: booking-service-dev
    linkingKeySchema:
      bookingId: entity-id
      orderId: entity-id
      traceId: http-correlation
    observationTypes:
      - incorrect-status
      - booking-failure
      - data-quality-issue
      - infrastructural-issue